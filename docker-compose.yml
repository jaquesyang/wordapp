services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wordapp-backend
    ports:
      - "8000:8000"
    volumes:
      - ./wordapp.db:/app/wordapp.db
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/grades"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wordapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: wordapp-network
