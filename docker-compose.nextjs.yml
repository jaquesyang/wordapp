services:
  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    container_name: wordapp-nextjs
    ports:
      - "3000:3000"
    volumes:
      - ./wordapp.db:/wordapp.db
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/grades"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: wordapp-nextjs-network
